<!DOCTYPE html>
<html lang="sd">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBELS WASSAN Admission Form</title>
    <style>
        :root { --primary: #002d5b; --accent: #8b0000; --whatsapp: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .page-border { background: white; width: 210mm; padding: 10mm; border: 3px solid var(--primary); box-shadow: 0 0 20px rgba(0,0,0,0.2); position: relative; box-sizing: border-box; }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
        .logo-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); }
        .school-info { text-align: center; flex: 1; padding: 0 10px; }
        .school-info h1 { margin: 0; color: var(--primary); font-size: 16px; font-weight: 800; }
        .photo-box { width: 100px; height: 120px; border: 2px dashed #555; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 10px; background: #fdfdfd; cursor: pointer; overflow: hidden; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .section { border: 1.2px solid #000; padding: 12px 10px 5px 10px; border-radius: 5px; margin-bottom: 12px; position: relative; }
        .section-label { position: absolute; top: -9px; left: 12px; background: white; padding: 0 8px; font-weight: 800; font-size: 10px; color: var(--accent); text-transform: uppercase; }
        .row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
        .field { flex: 1; display: flex; flex-direction: column; min-width: 140px; }
        label { font-weight: bold; font-size: 10px; margin-bottom: 2px; }
        input, select { padding: 6px; border: 1px solid #999; border-radius: 4px; font-size: 12px; }
        .btn-submit { background: var(--whatsapp); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        .office-section { border: 2px solid var(--primary); padding: 10px; background: #f9f9f9; border-radius: 6px; margin-top: 10px; }
        @media print { .no-print { display: none !important; } .page-border { border: 2px solid var(--primary); width: 100%; height: 100%; padding: 8mm; } }
    </style>
</head>
<body>

    <div class="page-border">
        <div class="header" id="form-top">
            <img src="https://gbelswassan-cyber.github.io/logo.png.png" class="logo-circle">
            <div class="school-info">
                <h1>GOVERNMENT BOYS ELEMENTARY LOWER SECONDARY SCHOOL WASSAN</h1>
                <p style="font-size: 9px; margin: 2px 0;">District Naushahro Feroze | SEMIS: 416040489</p>
                <span style="font-size: 11px; color: var(--accent); font-weight: bold; border: 1.5px solid #000; padding: 2px 12px; display: inline-block; margin-top: 3px; border-radius: 4px;">ADMISSION FORM 2026-2027</span>
            </div>
            <div class="photo-box" onclick="document.getElementById('photo-input').click();">
                <span id="photo-text">تصویر اپلوڈ کریں</span>
                <img id="preview-img" style="display: none;">
            </div>
            <input type="file" id="photo-input" accept="image/*" style="display: none;" onchange="previewPhoto(this)">
        </div>

        <form id="admissionForm">
            <div class="section">
                <span class="section-label">1. Student Information</span>
                <div class="row">
                    <div class="field"><label>Student Name:</label><input type="text" id="s_name" required></div>
                    <div class="field"><label>Father Name:</label><input type="text" id="f_name" required></div>
                </div>
                <div class="row">
                    <div class="field"><label>Caste:</label><input type="text" id="caste" required></div>
                    <div class="field"><label>DOB:</label><input type="date" id="dob" required></div>
                    <div class="field"><label>Gender:</label><select id="gender"><option>Male</option><option>Female</option></select></div>
                </div>
                <div class="row">
                    <div class="field"><label>B-Form / CNIC:</label><input type="text" id="cnic" required></div>
                    <div class="field"><label>Religion:</label><input type="text" id="religion" value="Islam"></div>
                </div>
            </div>

            <div class="section">
                <span class="section-label">2. Academic Details</span>
                <div class="row">
                    <div class="field"><label>Required Class:</label><input type="text" id="s_class" required></div>
                    <div class="field"><label>Previous School:</label><input type="text" id="prev_school"></div>
                </div>
                <div class="row">
                    <div class="field"><label>Last Class Passed:</label><input type="text" id="last_class"></div>
                    <div class="field"><label>Percentage / Grade:</label><input type="text" id="grade"></div>
                </div>
            </div>

            <div class="section">
                <span class="section-label">3. Contact Details</span>
                <div class="row">
                    <div class="field"><label>Father Occupation:</label><input type="text" id="occupation"></div>
                    <div class="field"><label>WhatsApp No:</label><input type="text" id="guardian_phone" required></div>
                </div>
                <div class="row"><div class="field"><label>Address:</label><input type="text" id="guardian_address" required></div></div>
            </div>

            <div class="section">
                <span class="section-label">4. Required Documents</span>
                <div class="row">
                    <div class="field"><label>Upload Documents (CNIC/B-Form):</label><input type="file" id="doc-input" accept="image/*,application/pdf" required></div>
                </div>
            </div>

            <button type="submit" class="btn-submit no-print" id="subBtn">جمع کریں اور واٹس ایپ پر بھیجیں ✅</button>

            <div class="office-section">
                <div style="text-align: center; font-weight: bold; text-decoration: underline; font-size: 12px; margin-bottom: 5px;">FOR OFFICE USE ONLY</div>
                <div class="row">
                    <div class="field"><label>G.R No:</label><input type="text" readonly></div>
                    <div class="field"><label>Date:</label><input type="text" readonly></div>
                </div>
            </div>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwxfkMSSDZs7nwAGOZY2Nhs2P8Sec5iPCd8WP-V0RIH6hYNXbJxJRSbOymzLdNS9Cq7kQ/exec';

        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('photo-text').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('admissionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.innerText = "Processing... (انتظار کریں)";
            btn.disabled = true;

            const toBase64 = file => new Promise((res, rej) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = () => res(r.result.split(',')[1]);
            });

            const photoFile = document.getElementById('photo-input').files[0];
            const docFile = document.getElementById('doc-input').files[0];

            const fd = new URLSearchParams();
            fd.append('s_name', document.getElementById('s_name').value);
            fd.append('f_name', document.getElementById('f_name').value);
            fd.append('caste', document.getElementById('caste').value);
            fd.append('dob', document.getElementById('dob').value);
            fd.append('gender', document.getElementById('gender').value);
            fd.append('cnic', document.getElementById('cnic').value);
            fd.append('religion', document.getElementById('religion').value);
            fd.append('s_class', document.getElementById('s_class').value);
            fd.append('prev_school', document.getElementById('prev_school').value);
            fd.append('last_class', document.getElementById('last_class').value);
            fd.append('grade', document.getElementById('grade').value);
            fd.append('occupation', document.getElementById('occupation').value);
            fd.append('guardian_phone', document.getElementById('guardian_phone').value);
            fd.append('guardian_address', document.getElementById('guardian_address').value);
            
            fd.append('photoData', await toBase64(photoFile));
            fd.append('photoType', photoFile.type);
            fd.append('docData', await toBase64(docFile));
            fd.append('docType', docFile.type);

            try {
                await fetch(scriptURL, { method: 'POST', body: fd });
                alert("آپ کا ڈیٹا کامیابی سے گوگل شیٹ میں محفوظ ہو گیا ہے!");
                window.open(`https://wa.me/923008909756?text=*NEW ADMISSION*%0AStudent: ${document.getElementById('s_name').value}%0AClass: ${document.getElementById('s_class').value}`);
            } catch (err) {
                alert("خرابی! دوبارہ کوشش کریں۔");
            } finally {
                btn.disabled = false;
                btn.innerText = "جمع کریں اور واٹس ایپ پر بھیجیں ✅";
            }
        });
    </script>
</body>
    </html>

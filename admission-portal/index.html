<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>GBELS WASSAN SMART ADMISSION SYSTEM</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#003366;
}

.photo-box{
width:90px;
height:110px;
border:2px dashed #333;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
}

.photo-box img{
width:90px;
height:110px;
object-fit:cover;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ccc;
}

button{
background:#003366;
color:white;
padding:10px;
border:none;
cursor:pointer;
width:100%;
margin-top:10px;
}

.print-btn{
background:#555;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<h1>GBELS WASSAN ADMISSION FORM</h1>

<div class="photo-box">
<input type="file" id="photo" onchange="preview(event)">
<img id="preview">
</div>

<h3>Required Information</h3>

<input id="name" placeholder="Student Name *">
<input id="father" placeholder="Father Name *">
<input id="class" placeholder="Class *">
<input id="phone" placeholder="WhatsApp Number *">

<h3>Optional Information</h3>

<input id="caste" placeholder="Caste">
<input id="dob" type="date">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="address" placeholder="Address">

<h3>Documents Upload</h3>

<label>B-Form</label>
<input type="file" id="bform">

<label>Father CNIC</label>
<input type="file" id="fcnic">

<label>Pass Certificate</label>
<input type="file" id="pass">

<label>Mark Sheet</label>
<input type="file" id="marks">

<label>Other Certificate</label>
<input type="file" id="other">

<button onclick="submitForm()">Submit Admission</button>

<button class="print-btn" onclick="window.print()">Manual Print Form</button>

<button onclick="generatePDF()">Download Admission Slip</button>

</div>

<script>

function preview(e){

const reader=new FileReader();

reader.onload=function(){
document.getElementById("preview").src=reader.result;
}

reader.readAsDataURL(e.target.files[0]);

}

function toBase64(file){

return new Promise(resolve=>{

const reader=new FileReader();

reader.onload=()=>resolve(reader.result.split(',')[1]);

reader.readAsDataURL(file);

});

}

async function submitForm(){

const name=document.getElementById("name").value;
const father=document.getElementById("father").value;
const sclass=document.getElementById("class").value;
const phone=document.getElementById("phone").value;

if(!name || !father || !sclass || !phone){

alert("Required fields missing");

return;

}

function f(id){
return document.getElementById(id).files[0];
}

const data={

name:name,
father:father,
class:sclass,
phone:phone,

caste:document.getElementById("caste").value,
dob:document.getElementById("dob").value,
gender:document.getElementById("gender").value,
address:document.getElementById("address").value,

photo:f("photo")?await toBase64(f("photo")):"",
bform:f("bform")?await toBase64(f("bform")):"",
fcnic:f("fcnic")?await toBase64(f("fcnic")):"",
pass:f("pass")?await toBase64(f("pass")):"",
marks:f("marks")?await toBase64(f("marks")):"",
other:f("other")?await toBase64(f("other")):""

};

fetch("YOUR_SCRIPT_URL_HERE",{

method:"POST",
body:JSON.stringify(data)

})

.then(r=>r.text())

.then(res=>{

if(res=="ALREADY"){

alert("Student Already Registered");

return;

}

alert("Admission Submitted");

window.open(
"https://wa.me/"+phone+"?text=Admission Submitted Successfully"
);

});

}

/* Admission Slip PDF */

function generatePDF(){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

var name=document.getElementById("name").value;
var father=document.getElementById("father").value;
var sclass=document.getElementById("class").value;

var admNo="ADM"+Math.floor(Math.random()*10000);

doc.setFontSize(18);
doc.text("GBELS WASSAN",70,20);

doc.setFontSize(14);
doc.text("Admission Slip",80,30);

doc.setFontSize(12);

doc.text("Admission No: "+admNo,20,50);
doc.text("Student Name: "+name,20,60);
doc.text("Father Name: "+father,20,70);
doc.text("Class: "+sclass,20,80);

doc.save(name+"_Admission_Slip.pdf");

}

</script>

</body>
</html>

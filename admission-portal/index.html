<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>GBELS WASSAN Admission Portal</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.container{
background:white;
padding:20px;
max-width:800px;
margin:auto;
}

.photo-box{
width:90px;
height:110px;
border:2px dashed #444;
display:flex;
align-items:center;
justify-content:center;
}

img{
width:90px;
height:110px;
object-fit:cover;
}

input{
width:100%;
padding:8px;
margin:4px 0;
}

button{
padding:10px;
background:#002d5b;
color:white;
border:none;
cursor:pointer;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container">

<h2>GBELS WASSAN ADMISSION FORM</h2>

<div class="photo-box">
<input type="file" id="photo" onchange="preview(event)">
<img id="preview">
</div>

<input id="s_name" placeholder="Student Name">
<input id="f_name" placeholder="Father Name">
<input id="caste" placeholder="Caste">
<input id="dob" type="date">
<input id="cnic" placeholder="B Form Number">
<input id="s_class" placeholder="Class">
<input id="guardian_phone" placeholder="Phone">
<input id="guardian_address" placeholder="Address">

<h4>Documents</h4>

<input type="file" id="bform">
<input type="file" id="slc">
<input type="file" id="cnic_copy">
<input type="file" id="result_card">

<button onclick="submitForm()">Submit Admission</button>

</div>

<script>

function preview(e){

const reader=new FileReader();

reader.onload=function(){

document.getElementById("preview").src=reader.result;

}

reader.readAsDataURL(e.target.files[0]);

}

function toBase64(file){

return new Promise((resolve)=>{

const reader=new FileReader();

reader.onload=()=>resolve(reader.result.split(',')[1]);

reader.readAsDataURL(file);

});

}

async function submitForm(){

let photo=document.getElementById("photo").files[0];
let bform=document.getElementById("bform").files[0];
let slc=document.getElementById("slc").files[0];
let cnic_copy=document.getElementById("cnic_copy").files[0];
let result_card=document.getElementById("result_card").files[0];

const data={

s_name:document.getElementById("s_name").value,
f_name:document.getElementById("f_name").value,
caste:document.getElementById("caste").value,
dob:document.getElementById("dob").value,
cnic:document.getElementById("cnic").value,
s_class:document.getElementById("s_class").value,
guardian_phone:document.getElementById("guardian_phone").value,
guardian_address:document.getElementById("guardian_address").value,

photo: photo? await toBase64(photo):"",
bform: bform? await toBase64(bform):"",
slc: slc? await toBase64(slc):"",
cnic_copy: cnic_copy? await toBase64(cnic_copy):"",
result_card: result_card? await toBase64(result_card):""

};

fetch("PASTE_WEB_APP_URL_HERE",{

method:"POST",
body:JSON.stringify(data)

}).then(()=>alert("Admission Submitted"));

}

</script>

</body>
</html>

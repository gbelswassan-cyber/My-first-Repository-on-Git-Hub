<!DOCTYPE html>
<html lang="sd">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Copy | GBELS WASSAN Admission Portal</title>
    <style>
        :root { --primary: #002d5b; --accent: #8b0000; --whatsapp: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .page-border { background: white; width: 210mm; min-height: 297mm; padding: 15mm; border: 4px solid var(--primary); box-shadow: 0 0 20px rgba(0,0,0,0.2); position: relative; box-sizing: border-box; }
        
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .logo-circle { width: 95px; height: 95px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }
        .school-info { text-align: center; flex: 1; padding: 0 10px; }
        .school-info h1 { margin: 0; color: var(--primary); font-size: 18px; text-transform: uppercase; font-weight: 800; }
        .contact-line { font-size: 9px; font-weight: bold; color: #333; margin-top: 5px; display: flex; justify-content: center; gap: 10px; border-top: 1px solid #ddd; padding-top: 5px; }
        .admission-tag { font-size: 13px; color: var(--accent); font-weight: bold; border: 1.5px solid #000; padding: 3px 15px; display: inline-block; margin-top: 8px; border-radius: 4px; }

        .section { border: 1.5px solid #000; padding: 18px 12px 10px 12px; border-radius: 6px; margin-bottom: 15px; position: relative; }
        .section-label { position: absolute; top: -11px; left: 15px; background: white; padding: 0 10px; font-weight: 800; font-size: 11px; color: var(--accent); }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .field { flex: 1; display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 10px; margin-bottom: 3px; }
        input { padding: 7px; border: 1px solid #999; border-radius: 4px; font-size: 12px; }

        .btn-whatsapp-submit { background: var(--whatsapp); color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }

        @media print {
            .no-print { display: none !important; }
            input::placeholder { color: transparent !important; }
            input { border: none !important; border-bottom: 1px dotted #000 !important; background: transparent !important; }
            .page-border { box-shadow: none; border: 2.5px solid #000; }
        }
    </style>
</head>
<body>

    <div class="no-print" style="margin-bottom: 20px;">
        <button onclick="window.print()" style="padding: 10px 20px; cursor: pointer;">Print Manual Form 🖨️</button>
    </div>

    <div class="page-border">
        <div class="header">
            <img src="https://gbelswassan-cyber.github.io/logo.png.png" class="logo-circle">
            <div class="school-info">
                <h1>GOVERNMENT BOYS ELEMENTARY LOWER SECONDARY SCHOOL WASSAN</h1>
                <div class="contact-line">
                    🌐 <span>gbelswassan-cyber.github.io</span> | 📧 <span>gbelswassan@gmail.com</span> | 💬 <span>+92 300 8909756</span>
                </div>
                <span class="admission-tag">ADMISSION FORM (Session: 2026-2027)</span>
            </div>
            <div style="width:100px; height:110px; border:1px dashed #000; text-align:center; font-size:9px; padding-top:40px;">Photo</div>
        </div>

        <form id="admissionForm">
            <div class="section">
                <span class="section-label">STUDENT INFORMATION</span>
                <div class="row">
                    <div class="field"><label>Student Name:</label><input type="text" id="s_name" placeholder="Enter Full Name"></div>
                    <div class="field"><label>Father's Name:</label><input type="text" id="f_name" placeholder="Enter Father Name"></div>
                </div>
                <div class="row">
                    <div class="field"><label>Caste:</label><input type="text" id="caste" placeholder="Surname"></div>
                    <div class="field"><label>Class:</label><input type="text" id="s_class" placeholder="Required Class"></div>
                </div>
            </div>

            <div class="no-print">
                <button type="button" class="btn-whatsapp-submit" onclick="submitFinal()">
                    Apply Online (WhatsApp + Documents) ✅
                </button>
            </div>

            <div style="border: 1px solid #000; padding: 10px; margin-top: 20px;">
                <p style="text-align:center; font-weight:bold; font-size:10px;">FOR OFFICE USE ONLY</p>
                <div style="display:flex; justify-content:space-between; margin-top:30px;">
                    <div style="border-top:1px solid #000; width:140px; text-align:center; font-size:9px;">Class Teacher</div>
                    <div style="border-top:1px solid #000; width:140px; text-align:center; font-size:9px;">Head Master</div>
                </div>
            </div>
        </form>
    </div>

    <script>
        function submitFinal() {
            const name = document.getElementById('s_name').value;
            const fname = document.getElementById('f_name').value;
            if(!name || !fname) { alert("Please fill name!"); return; }

            const msg = `*GBELS WASSAN ADMISSION*%0AName: ${name}%0AFather: ${fname}%0A_Documents loading on Google Form..._`;
            window.open(`https://wa.me/923008909756?text=${msg}`, '_blank');

            setTimeout(() => {
                window.open("https://forms.gle/JHjrqTRcTzioHAU56", "_blank");
            }, 3000);
        }
    </script>
</body>
</html>

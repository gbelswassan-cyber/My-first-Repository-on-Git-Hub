            <div class="section">
                <span class="section-label">2. Academic & Contact Details</span>
                <div class="row">
                    <div class="field"><label>Admission Required in Class:</label><input type="text" id="s_class" placeholder="e.g. 6th, 7th" required></div>
                    <div class="field"><label>Previous School Name:</label><input type="text" id="prev_school" placeholder="Last School Attended"></div>
                </div>
                <div class="row">
                    <div class="field"><label>Guardian Mobile No (WhatsApp):</label><input type="text" id="phone" placeholder="03XXXXXXXXX" required></div>
                    <div class="field"><label>Residential Address:</label><input type="text" id="address" placeholder="Village / City Address" required></div>
                </div>
            </div>

            <div class="no-print">
                <button type="button" class="btn-whatsapp-submit" onclick="submitToWhatsApp()">
                    <span>Apply Online & Send via WhatsApp ✅</span>
                </button>
                <p style="text-align: center; font-size: 11px; color: #666; font-style: italic;">
                    نوٽ: واٽس اپ تي ميسيج موڪلڻ کانپوءِ خودڪار طريقي سان گوگل فارم کلندو، اتي ڪاغذ اپلوڊ ڪريو.
                </p>
            </div>

            <div class="office-section">
                <div class="office-title">FOR OFFICE USE ONLY (صرف آفيس جي استعمال لاءِ)</div>
                <div class="row">
                    <div class="field"><label>G.R Number:</label><input type="text" readonly></div>
                    <div class="field"><label>Admission Date:</label><input type="text" readonly></div>
                    <div class="field"><label>Status:</label><span>[ ] Approved [ ] Pending</span></div>
                </div>
                
                <div class="signature-row">
                    <div class="sig-line">Class Teacher Signature</div>
                    <div class="sig-line">Admission Incharge</div>
                    <div class="sig-line">Head Master Stamp</div>
                </div>
            </div>
        </form>
    </div>

    <script>
        function submitToWhatsApp() {
            const name = document.getElementById('s_name').value;
            const fname = document.getElementById('f_name').value;
            const caste = document.getElementById('caste').value;
            const sClass = document.getElementById('s_class').value;
            const phone = document.getElementById('phone').value;
            const cnic = document.getElementById('cnic').value;

            if(name === "" || fname === "" || phone === "") {
                alert("مهرباني ڪري فارم مڪمل ڀريو!");
                return;
            }

            const message = `*GBELS WASSAN - NEW ADMISSION*%0A` +
                            `------------------------------%0A` +
                            `*Student Name:* ${name}%0A` +
                            `*Father Name:* ${fname}%0A` +
                            `*Caste:* ${caste}%0A` +
                            `*Class:* ${sClass}%0A` +
                            `*B-Form/CNIC:* ${cnic}%0A` +
                            `*WhatsApp:* ${phone}%0A` +
                            `------------------------------%0A` +
                            `Kindly review my application. I am uploading my documents now.`;

            // WhatsApp Redirect
            window.open(`https://wa.me/923008909756?text=${message}`, '_blank');

            // Google Form Redirect (After 3 seconds)
            setTimeout(() => {
                window.open("https://forms.gle/JHjrqTRcTzioHAU56", "_blank");
            }, 3000);
        }
    </script>

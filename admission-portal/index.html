<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Portal 2026 | GBELS WASSAN</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --primary: #0d1b3e; --gold: #c5a059; --bg: #f4f7f9; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        
        .header-box { background: var(--primary); color: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; border-bottom: 6px solid var(--gold); display: flex; flex-direction: column; align-items: center; }
        .logo-main { width: 90px; height: 90px; background: white; border-radius: 50%; border: 3px solid var(--gold); padding: 5px; margin-bottom: 10px; }

        .form-container { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--gold); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; text-align: right; font-size: 16px; }
        
        .photo-upload-label { display: block; background: #eee; padding: 15px; border: 2px dashed var(--primary); border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-weight: bold; color: var(--primary); }
        #photo-preview { width: 100px; height: 120px; border: 2px solid var(--gold); margin: 10px auto; display: none; object-fit: cover; border-radius: 5px; }

        .btn { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-submit { background: var(--primary); width: 100%; font-size: 18px; margin-top: 10px; border: 2px solid var(--gold); }

        /* PDF Slip Layout */
        #slip-template { width: 700px; padding: 40px; border: 15px double var(--primary); background: white; position: absolute; left: -9999px; direction: ltr; text-align: left; }
        .pdf-header { text-align: center; border-bottom: 4px solid var(--gold); padding-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .pdf-body { margin-top: 30px; display: flex; gap: 30px; }
        .pdf-details { flex: 1; font-size: 18px; line-height: 2; }
        .pdf-photo { width: 130px; height: 160px; border: 2px solid #333; object-fit: cover; }
    </style>
</head>
<body>

<div class="header-box">
    <img src="1000110972.png" alt="GBELS Logo" class="logo-main">
    <h2 style="margin: 5px 0;">GOVT BOYS ELEMENTARY LOWER SECONDARY SCHOOL WASSAN</h2>
    <p style="margin: 0; color: var(--gold);">ONLINE ADMISSION PORTAL - 2026</p>
</div>

<div class="form-container">
    <h3 style="color: var(--primary);">داخلا فارم (Admission Form)</h3>
    
    <label for="s_photo" class="photo-upload-label">📸 شاگرد جي تصوير چونڊيو (Upload Photo)</label>
    <input type="file" id="s_photo" accept="image/*" style="display: none;" onchange="previewImage(this)">
    <img id="photo-preview" src="">

    <input type="text" id="s_name" placeholder="شاگرد جو نالو (Student Name)">
    <input type="text" id="f_name" placeholder="پيءُ جو نالو (Father Name)">
    
    <select id="s_class">
        <option value="">ڪلاس چونڊيو (Select Class)</option>
        <option value="Class 1">ڪلاس پهريون (Class 1st)</option>
        <option value="Class 2">ڪلاس ٻيون (Class 2nd)</option>
        <option value="Class 3">ڪلاس ٽيون (Class 3rd)</option>
        <option value="Class 4">ڪلاس چوٿون (Class 4th)</option>
        <option value="Class 5">ڪلاس پنجون (Class 5th)</option>
        <option value="Class 6">ڪلاس ڇهون (Class 6th)</option>
        <option value="Class 7">ڪلاس ستون (Class 7th)</option>
        <option value="Class 8">ڪلاس اٺون (Class 8th)</option>
    </select>

    <input type="text" id="s_phone" placeholder="موبائيل نمبر (WhatsApp No)">

    <button class="btn btn-submit" onclick="processAdmission()">فارم جمع ڪريو ۽ سلپ ڊائون لوڊ ڪريو 📥</button>
</div>

<div id="slip-template">
    <div class="pdf-header">
        <img src="1000110972.png" style="width: 80px;">
        <div>
            <h1 style="color: var(--primary); margin: 0; font-size: 26px;">GBELS WASSAN</h1>
            <p style="margin: 0; font-weight: bold;">ADMISSION SLIP - SESSION 2026-27</p>
        </div>
    </div>
    <div class="pdf-body">
        <div class="pdf-details">
            <p><strong>Registration ID:</strong> <span id="p_id" style="color: darkred;"></span></p>
            <p><strong>Student Name:</strong> <span id="p_name"></span></p>
            <p><strong>Father's Name:</strong> <span id="p_fname"></span></p>
            <p><strong>Class:</strong> <span id="p_class"></span></p>
            <p><strong>Date:</strong> <span id="p_date"></span></p>
        </div>
        <img id="p_photo" class="pdf-photo" src="">
    </div>
    <div style="margin-top: 50px; display: flex; justify-content: space-between;">
        <p style="border-top: 1px solid #000; width: 180px; text-align: center;">Head Master Stamp</p>
        <p style="border-top: 1px solid #000; width: 180px; text-align: center;">Admission Officer</p>
    </div>
</div>

<script>
    let studentPhotoData = "";

    function previewImage(input) {
        if (input.files && input.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                studentPhotoData = e.target.result;
                document.getElementById('photo-preview').src = studentPhotoData;
                document.getElementById('photo-preview').style.display = "block";
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function processAdmission() {
        const name = document.getElementById('s_name').value;
        const fname = document.getElementById('f_name').value;
        const sClass = document.getElementById('s_class').value;
        const phone = document.getElementById('s_phone').value;
        const date = new Date().toLocaleDateString('en-GB');

        if(!name || !fname || !sClass || !studentPhotoData) {
            alert("مهرباني ڪري سڀ معلومات ۽ تصوير اپلوڊ ڪريو!");
            return;
        }

        const regID = "W-26-" + Math.floor(1000 + Math.random() * 9000);
        const record = {regID, name, fname, sClass, date, photo: studentPhotoData};

        generateSlipPDF(record);
    }

    function generateSlipPDF(record) {
        document.getElementById('p_id').innerText = record.regID;
        document.getElementById('p_name').innerText = record.name;
        document.getElementById('p_fname').innerText = record.fname;
        document.getElementById('p_class').innerText = record.sClass;
        document.getElementById('p_date').innerText = record.date;
        document.getElementById('p_photo').src = record.photo;

        const slip = document.getElementById('slip-template');
        html2canvas(slip, { scale: 2, useCORS: true }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
            pdf.save(`Admission_Slip_${record.regID}.pdf`);
            alert("مبارڪون! داخلا سلپ تيار ٿي وئي آهي.");
        });
    }
</script>

</body>
</html>
